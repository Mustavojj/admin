<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninja TON - Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <style>
/* styles.css */
:root {
  --gradient-start: #0f172a;
  --gradient-end: #0a0f1f;
  --bg-primary: #0a0f1f;
  --bg-secondary: #0f172a;
  --bg-card: rgba(15, 23, 42, 0.8);
  --bg-modal: rgba(0, 0, 0, 0.85);
  --glass-border: rgba(59, 130, 246, 0.2);
  
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-light: #64748b;
  --text-muted: #475569;
  
  --primary: #3b82f6;
  --primary-dark: #2563eb;
  --primary-light: #60a5fa;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --info: #06b6d4;
  --purple: #8b5cf6;
  
  --border-color: rgba(59, 130, 246, 0.2);
  --border-radius: 20px;
  --border-radius-sm: 12px;
  
  --font-primary: 'Inter', sans-serif;
  --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.3);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  font-size: 16px;
}

body {
  font-family: var(--font-primary);
  background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overflow-x: hidden;
}

#login-container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
  background: linear-gradient(135deg, #0f172a, #0a0f1f);
}

.login-card {
  background: rgba(15, 23, 42, 0.9);
  backdrop-filter: blur(10px);
  border-radius: var(--border-radius);
  padding: 40px;
  width: 100%;
  max-width: 400px;
  border: 1px solid var(--glass-border);
  box-shadow: var(--shadow-md);
}

.login-logo {
  text-align: center;
  margin-bottom: 30px;
}

.logo-icon {
  width: 70px;
  height: 70px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 15px;
  font-size: 28px;
  color: white;
  box-shadow: var(--shadow-glow);
}

.login-logo h1 {
  font-size: 1.8rem;
  font-weight: 800;
  margin-bottom: 5px;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.login-subtitle {
  color: var(--text-secondary);
  font-size: 0.9rem;
}

.input-with-icon {
  position: relative;
  margin-bottom: 20px;
}

.input-with-icon i {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-light);
}

.input-with-icon input {
  width: 100%;
  padding: 14px 16px 14px 48px;
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid var(--glass-border);
  border-radius: var(--border-radius-sm);
  color: var(--text-primary);
  font-size: 1rem;
  outline: none;
  transition: all 0.3s ease;
}

.input-with-icon input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
}

.login-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  border: none;
  border-radius: var(--border-radius-sm);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.3s ease;
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-glow);
}

.login-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.login-message {
  margin-top: 15px;
  padding: 12px;
  border-radius: var(--border-radius-sm);
  text-align: center;
  font-weight: 500;
  display: none;
}

.login-message.error {
  background: rgba(239, 68, 68, 0.1);
  color: var(--danger);
  border: 1px solid rgba(239, 68, 68, 0.3);
}

.login-message.success {
  background: rgba(16, 185, 129, 0.1);
  color: var(--success);
  border: 1px solid rgba(16, 185, 129, 0.3);
}

#app-container {
  display: none;
  min-height: 100vh;
}

.sidebar-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.7);
  z-index: 999;
  backdrop-filter: blur(4px);
}

.sidebar-overlay.show {
  display: block;
}

#sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: 280px;
  height: 100vh;
  background: rgba(15, 23, 42, 0.95);
  backdrop-filter: blur(10px);
  border-right: 1px solid var(--glass-border);
  z-index: 1000;
  transform: translateX(-100%);
  display: flex;
  flex-direction: column;
  transition: transform 0.3s ease;
}

#sidebar.show {
  transform: translateX(0);
}

#sidebar-header {
  padding: 24px 20px;
  border-bottom: 1px solid var(--glass-border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.sidebar-logo .logo-icon {
  width: 44px;
  height: 44px;
  margin: 0;
  font-size: 20px;
}

.sidebar-logo h2 {
  font-size: 1.3rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logo-subtitle {
  font-size: 0.7rem;
  color: var(--text-light);
}

.sidebar-close {
  background: none;
  border: none;
  color: var(--text-primary);
  font-size: 24px;
  cursor: pointer;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  transition: background 0.3s ease;
}

.sidebar-close:hover {
  background: rgba(255, 255, 255, 0.1);
}

.sidebar-nav {
  flex: 1;
  padding: 20px 0;
  overflow-y: auto;
}

.nav-menu {
  list-style: none;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 24px;
  color: var(--text-secondary);
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.3s ease;
  margin: 4px 0;
}

.nav-item:hover {
  background: rgba(59, 130, 246, 0.1);
  color: var(--primary-light);
}

.nav-item.active {
  background: linear-gradient(90deg, rgba(59, 130, 246, 0.2), transparent);
  color: var(--primary);
  border-left-color: var(--primary);
}

.nav-item i {
  width: 24px;
  text-align: center;
  font-size: 1.1rem;
}

.nav-item span {
  font-weight: 500;
}

.sidebar-footer {
  padding: 20px;
  border-top: 1px solid var(--glass-border);
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.user-info {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text-secondary);
  padding: 8px 12px;
  background: rgba(0, 0, 0, 0.2);
  border-radius: var(--border-radius-sm);
}

.user-info i {
  font-size: 20px;
}

.logout-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 12px;
  background: rgba(239, 68, 68, 0.1);
  color: var(--danger);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: var(--border-radius-sm);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
}

.logout-btn:hover {
  background: rgba(239, 68, 68, 0.2);
}

#main-content {
  flex: 1;
  margin-left: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

#top-bar {
  padding: 20px 28px;
  background: rgba(15, 23, 42, 0.8);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--glass-border);
  display: flex;
  align-items: center;
  gap: 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.mobile-menu-btn {
  background: none;
  border: none;
  color: var(--text-primary);
  font-size: 22px;
  cursor: pointer;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  transition: background 0.3s ease;
}

.mobile-menu-btn:hover {
  background: rgba(255, 255, 255, 0.1);
}

#page-title {
  font-size: 1.5rem;
  font-weight: 700;
  flex: 1;
  background: linear-gradient(135deg, var(--text-primary), var(--primary-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 15px;
}

.status-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.85rem;
  color: var(--success);
  background: rgba(16, 185, 129, 0.1);
  padding: 6px 12px;
  border-radius: 20px;
}

.status-indicator i {
  font-size: 10px;
}

#content-area {
  flex: 1;
  padding: 28px;
  overflow-y: auto;
}

.page-header {
  margin-bottom: 32px;
}

.page-header h2 {
  font-size: 1.8rem;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.page-header p {
  color: var(--text-secondary);
  font-size: 0.95rem;
}

.card {
  background: var(--bg-card);
  backdrop-filter: blur(10px);
  border-radius: var(--border-radius);
  padding: 24px;
  border: 1px solid var(--glass-border);
  margin-bottom: 24px;
  transition: all 0.3s ease;
}

.card:hover {
  border-color: rgba(59, 130, 246, 0.4);
  box-shadow: var(--shadow-sm);
}

.card h3 {
  font-size: 1.3rem;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.dashboard-page {
  padding: 10px 0;
}

.stats-grid {
  display: grid;
  gap: 20px;
  margin-bottom: 30px;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
}

.stat-card {
  background: var(--bg-card);
  backdrop-filter: blur(10px);
  border-radius: var(--border-radius);
  padding: 20px;
  border: 1px solid var(--glass-border);
  transition: all 0.3s ease;
}

.stat-card:hover {
  transform: translateY(-2px);
  border-color: rgba(59, 130, 246, 0.4);
}

.stat-card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}

.stat-card-header i {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 18px;
}

.stat-card-header h3 {
  font-size: 1.1rem;
  margin-bottom: 0;
  font-weight: 600;
  color: var(--text-secondary);
}

.stat-card-body {
  display: grid;
  gap: 12px;
}

.stat-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--glass-border);
}

.stat-item:last-child {
  border-bottom: none;
}

.stat-label {
  color: var(--text-secondary);
  font-size: 0.9rem;
}

.stat-value {
  font-weight: 700;
  font-size: 1rem;
  color: var(--primary-light);
}

.quick-actions {
  margin-top: 30px;
}

.quick-actions h3 {
  font-size: 1.2rem;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.actions-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
}

.quick-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 24px;
  background: var(--bg-card);
  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: var(--border-radius);
  color: var(--text-primary);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all 0.3s ease;
}

.quick-btn:hover {
  transform: translateY(-2px);
  border-color: var(--primary);
  box-shadow: var(--shadow-glow);
}

.quick-btn i {
  font-size: 24px;
  color: var(--primary);
}

.search-section {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.search-box {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-card);
  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: var(--border-radius);
  padding: 0 18px;
  min-width: 280px;
}

.search-box i {
  color: var(--text-light);
}

.search-box input {
  flex: 1;
  padding: 14px 0;
  background: none;
  border: none;
  color: var(--text-primary);
  font-size: 0.95rem;
  outline: none;
}

.search-btn {
  padding: 12px 24px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  border: none;
  border-radius: var(--border-radius-sm);
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  transition: all 0.3s ease;
}

.search-btn:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-glow);
}

.user-results {
  margin-top: 20px;
}

.users-list {
  display: grid;
  gap: 20px;
}

.user-card {
  background: var(--bg-card);
  backdrop-filter: blur(10px);
  border-radius: var(--border-radius);
  padding: 20px;
  border: 1px solid var(--glass-border);
  transition: all 0.3s ease;
}

.user-card:hover {
  border-color: rgba(59, 130, 246, 0.4);
}

.user-card-header {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 20px;
}

.user-avatar {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 22px;
  overflow: hidden;
}

.user-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.user-info h4 {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 6px;
}

.user-status {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 700;
  display: inline-block;
}

.user-status.free {
  background: rgba(16, 185, 129, 0.1);
  color: var(--success);
  border: 1px solid rgba(16, 185, 129, 0.3);
}

.user-status.ban {
  background: rgba(239, 68, 68, 0.1);
  color: var(--danger);
  border: 1px solid rgba(239, 68, 68, 0.3);
}

.user-stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin-bottom: 20px;
  padding: 15px;
  background: rgba(0, 0, 0, 0.3);
  border-radius: var(--border-radius-sm);
  border: 1px solid var(--glass-border);
}

.user-stat-item {
  display: flex;
  align-items: center;
  gap: 10px;
}

.user-stat-item i {
  width: 32px;
  height: 32px;
  background: rgba(59, 130, 246, 0.2);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--primary);
}

.user-stat-info {
  flex: 1;
}

.user-stat-label {
  font-size: 0.7rem;
  color: var(--text-light);
}

.user-stat-value {
  font-weight: 700;
  font-size: 0.9rem;
}

.user-card-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 15px;
}

.balance-buttons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.form-group {
  margin-bottom: 18px;
}

.form-group label {
  display: block;
  margin-bottom: 8px;
  font-weight: 500;
  color: var(--text-secondary);
  font-size: 0.9rem;
}

.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  padding: 12px 16px;
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid var(--glass-border);
  border-radius: var(--border-radius-sm);
  color: var(--text-primary);
  font-size: 0.95rem;
  outline: none;
  transition: all 0.3s ease;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
}

.form-group textarea {
  resize: vertical;
  min-height: 100px;
  font-family: var(--font-primary);
}

.form-group small {
  display: block;
  margin-top: 6px;
  color: var(--text-muted);
  font-size: 0.8rem;
}

.action-btn {
  padding: 8px 16px;
  border: none;
  border-radius: var(--border-radius-sm);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.3s ease;
}

.action-btn:hover {
  transform: translateY(-1px);
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
}

.btn-success {
  background: linear-gradient(135deg, var(--success), #0d9488);
  color: white;
}

.btn-danger {
  background: linear-gradient(135deg, var(--danger), #dc2626);
  color: white;
}

.btn-warning {
  background: linear-gradient(135deg, var(--warning), #d97706);
  color: white;
}

.btn-info {
  background: linear-gradient(135deg, var(--info), #0891b2);
  color: white;
}

.btn-secondary {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text-primary);
  border: 1px solid var(--glass-border);
}

.btn-sm {
  padding: 6px 12px;
  font-size: 0.8rem;
}

.tasks-management {
  display: grid;
  grid-template-columns: 1fr 1.5fr;
  gap: 24px;
}

@media (max-width: 768px) {
  .tasks-management {
    grid-template-columns: 1fr;
  }
}

.create-task-section {
  max-width: 100%;
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.tasks-list,
.promo-codes-list,
.withdrawals-list {
  display: grid;
  gap: 15px;
}

.task-item {
  background: rgba(0, 0, 0, 0.3);
  border-radius: var(--border-radius);
  padding: 18px;
  border: 1px solid var(--glass-border);
  transition: all 0.3s ease;
}

.task-item:hover {
  border-color: rgba(59, 130, 246, 0.4);
}

.task-image-container {
  width: 70px;
  height: 70px;
  margin: 0 auto 12px;
}

.task-image {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--glass-border);
}

.task-header {
  margin-bottom: 15px;
  text-align: center;
}

.task-header h4 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 8px;
}

.task-meta {
  display: flex;
  justify-content: center;
  gap: 8px;
}

.task-type {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 700;
}

.type-main {
  background: rgba(59, 130, 246, 0.2);
  color: var(--primary);
}

.type-partner {
  background: rgba(139, 92, 246, 0.2);
  color: var(--purple);
}

.type-social {
  background: rgba(16, 185, 129, 0.2);
  color: var(--success);
}

.type-daily {

  async initializeFirebase() {
    try {
      if (!firebase.apps.length) {
        firebase.initializeApp(FIREBASE_CONFIG);
      }
      this.db = firebase.database();
      this.auth = firebase.auth();
      console.log("✅ Firebase initialized");
      this.setupEventListeners();
    } catch (error) {
      console.error("❌ Firebase error:", error);
      this.showLoginMessage("Failed to initialize Firebase", "error");
    }
  }

  loadSettings() {
    const saved = localStorage.getItem('popbuzz_settings');
    if (saved) {
      try { this.settings = JSON.parse(saved); } catch(e) {}
    }
  }

  saveSettings() {
    localStorage.setItem('popbuzz_settings', JSON.stringify(this.settings));
  }

  setupEventListeners() {
    this.elements.loginButton.addEventListener('click', () => this.handleLogin());
    this.elements.loginPassword.addEventListener('keypress', (e) => { if (e.key === 'Enter') this.handleLogin(); });
    this.elements.menuToggle.addEventListener('click', () => this.toggleSidebar());
    this.elements.sidebarOverlay.addEventListener('click', () => this.hideSidebar());
    this.elements.sidebarClose.addEventListener('click', () => this.hideSidebar());
    this.elements.logoutBtn.addEventListener('click', () => this.handleLogout());
    this.setupNavigation();
  }

  toggleSidebar() {
    this.elements.sidebar.classList.toggle('show');
    this.elements.sidebarOverlay.classList.toggle('show');
  }

  hideSidebar() {
    this.elements.sidebar.classList.remove('show');
    this.elements.sidebarOverlay.classList.remove('show');
  }

  setupNavigation() {
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(item => {
      item.addEventListener('click', (e) => {
        const pageKey = e.currentTarget.dataset.page;
        if (pageKey) {
          navItems.forEach(nav => nav.classList.remove('active'));
          item.classList.add('active');
          this.showPage(pageKey);
          this.hideSidebar();
        }
      });
    });
  }

  showLoginMessage(message, type) {
    const messageEl = this.elements.loginMessage;
    messageEl.textContent = message;
    messageEl.className = `login-message ${type}`;
    messageEl.style.display = 'block';
    setTimeout(() => { messageEl.style.display = 'none'; }, 3000);
  }

  async handleLogin() {
    const password = this.elements.loginPassword.value.trim();
    if (!password) { this.showLoginMessage("Please enter a password", "error"); return; }
    this.elements.loginButton.disabled = true;
    this.elements.loginButton.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Authenticating...';
    try {
      const userCredential = await this.auth.signInAnonymously();
      this.currentUser = userCredential.user;
      const isValid = ADMIN_PASSWORDS.includes(password);
      if (isValid) {
        this.showLoginMessage("Login successful!", "success");
        setTimeout(() => {
          this.elements.loginContainer.style.display = 'none';
          this.elements.appContainer.style.display = 'flex';
          this.showPage('dashboard');
        }, 1000);
      } else {
        this.showLoginMessage("Invalid password!", "error");
        this.elements.loginPassword.focus();
      }
    } catch (error) {
      this.showLoginMessage("Authentication failed", "error");
    } finally {
      this.elements.loginButton.disabled = false;
      this.elements.loginButton.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> Login';
    }
  }

  handleLogout() {
    if (confirm('Are you sure you want to logout?')) {
      this.auth.signOut();
      this.elements.appContainer.style.display = 'none';
      this.elements.loginContainer.style.display = 'flex';
      this.elements.loginPassword.value = '';
    }
  }

  async showPage(pageName) {
    this.elements.pageTitle.textContent = this.getPageTitle(pageName);
    switch(pageName) {
      case 'dashboard': await this.renderDashboard(); break;
      case 'users': await this.renderUsers(); break;
      case 'tasks': await this.renderTasks(); break;
      case 'promoCodes': await this.renderPromoCodes(); break;
      case 'withdrawals': await this.renderWithdrawals(); break;
      case 'broadcast': await this.renderBroadcast(); break;
      case 'settings': await this.renderSettings(); break;
      case 'myUid': await this.renderMyUid(); break;
      default: await this.renderDashboard();
    }
  }

  getPageTitle(pageName) {
    const titles = { 'dashboard': 'Dashboard', 'users': 'Users Management', 'tasks': 'Tasks Management', 'promoCodes': 'Promo Codes', 'withdrawals': 'Withdrawals', 'broadcast': 'Broadcast', 'settings': 'Settings', 'myUid': 'My UID' };

>Total Tasks</span><span class="stat-value" id="totalTasks">0</span></div><div class="stat-item"><span class="stat-label">Main Tasks</span><span class="stat-value" id="mainTasks">0</span></div><div class="stat-item"><span class="stat-label">Partner Tasks</span><span class="stat-value" id="partnerTasks">0</span></div><div class="stat-item"><span class="stat-label">Completed Tasks</span><span class="stat-value" id="completedTasks">0</span></div></div></div><div class="stat-card"><div class="stat-card-header"><i class="fas fa-chart-line"></i><h3>Financial Statistics</h3></div><div class="stat-card-body"><div class="stat-item"><span class="stat-label">Total Distributed</span><span class="stat-value" id="totalDistributed">0 TON</span></div><div class="stat-item"><span class="stat-label">Total Balance</span><span class="stat-value" id="totalBalance">0 TON</span></div><div class="stat-item"><span class="stat-label">Total POP Balance</span><span class="stat-value" id="totalPopBalance">0 POP</span></div><div class="stat-item"><span class="stat-label">Referral Earnings</span><span class="stat-value" id="referralEarnings">0 TON</span></div><div class="stat-item"><span class="stat-label">Task Earnings</span><span class="stat-value" id="taskEarnings">0 TON</span></div></div></div></div></div><div class="quick-actions"><h3><i class="fas fa-bolt"></i> Quick Actions</h3><div class="actions-grid"><button class="quick-btn" onclick="admin.showPage('users')"><i class="fas fa-user-search"></i><span>Search User</span></button><button class="quick-btn" onclick="admin.showPage('tasks')"><i class="fas fa-plus-circle"></i><span>Create Task</span></button><button class="quick-btn" onclick="admin.showPage('promoCodes')"><i class="fas fa-ticket"></i><span>Add Promo Code</span></button><button class="quick-btn" onclick="admin.showPage('withdrawals')"><i class="fas fa-wallet"></i><span>Process Withdrawal</span></button></div></div></div></div>`;
    await this.loadDashboardData();

  async loadDashboardData() {
    try {
      const today = new Date().setHours(0,0,0,0);
      const [usersSnap, tasksSnap, withdrawalsSnap] = await Promise.all([this.db.ref('users').once('value'), this.db.ref('config/tasks').once('value'), this.db.ref('withdrawals').once('value')]);
      let totalUsers=0, todayUsers=0, bannedUsers=0, activeUsers=0, totalBalance=0, totalPopBalance=0, totalEarned=0, referralEarnings=0;
      usersSnap.forEach(child => { const user=child.val(); totalUsers++; if(user.createdAt && user.createdAt>=today) todayUsers++; if(user.status==='ban') bannedUsers++; else activeUsers++; totalBalance+=this.safeNumber(user.balance); totalPopBalance+=this.safeNumber(user.pop); totalEarned+=this.safeNumber(user.totalEarned); referralEarnings+=this.safeNumber(user.referralEarnings); });
      let totalTasks=0, mainTasks=0, partnerTasks=0, completedTasks=0;
      if(tasksSnap.exists()){ tasksSnap.forEach(child=>{ const task=child.val(); if(task.status!=='deleted'){ totalTasks++; if(task.category==='main') mainTasks++; else if(task.category==='partner') partnerTasks++; if(task.currentCompletions>=task.maxCompletions) completedTasks++; } }); }
      let totalWithdrawals=0, todayWithdrawals=0, pendingWithdrawals=0, confirmedWithdrawals=0, totalDistributed=0;
      if(withdrawalsSnap.exists()){ const w=withdrawalsSnap.val(); if(w.pending) pendingWithdrawals=Object.keys(w.pending).length; if(w.completed){ confirmedWithdrawals=Object.keys(w.completed).length; Object.values(w.completed).forEach(wd=>{ totalDistributed+=this.safeNumber(wd.amount); if(wd.createdAt && wd.createdAt>=today) todayWithdrawals++; }); } totalWithdrawals=pendingWithdrawals+confirmedWithdrawals+(w.rejected?Object.keys(w.rejected).length:0); }
      document.getElementById('dashboardLoading').style.display='none'; document.getElementById('dashboardContent').style.display='block';
      document.getElementById('totalUsers').textContent=totalUsers; document.getElementById('todayUsers').textContent=todayUsers; document.getElementById('bannedUsers').textContent=bannedUsers; document.getElementById('activeUsers').textContent=activeUsers; document.getElementById('totalWithdrawals').textContent=totalWithdrawals; document.getElementById('todayWithdrawals').textContent=todayWithdrawals; document.getElementById('pendingWithdrawals').textContent=pendingWithdrawals; document.getElementById('confirmedWithdrawals').textContent=confirmedWithdrawals; document.getElementById('totalTasks').textContent=totalTasks; document.getElementById('mainTasks').textContent=mainTasks; document.getElementById('partnerTasks').textContent=partnerTasks; document.getElementById('completedTasks').textContent=completedTasks; document.getElementById('totalDistributed').textContent=totalDistributed.toFixed(3)+' TON'; document.getElementById('totalBalance').textContent=totalBalance.toFixed(3)+' TON'; document.getElementById('totalPopBalance').textContent=Math.floor(totalPopBalance)+' POP'; document.getElementById('referralEarnings').textContent=referralEarnings.toFixed(3)+' TON'; document.getElementById('taskEarnings').textContent=(totalEarned-referralEarnings).toFixed(3)+' TON';
    } catch(e){ console.error(e); }
  }

  async renderUsers() {
    this.elements.contentArea.innerHTML = `<div class="users-page"><div class="page-header"><h2><i class="fas fa-users"></i> Users Management</h2><p>Search for users and manage their accounts</p></div><div class="search-section"><div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchUserInput" placeholder="Search by User ID, Username, or Telegram ID"><button class="search-btn" onclick="admin.searchUser()"><i class="fas fa-search"></i> Search</button></div><button class="action-btn btn-secondary" onclick="admin.clearSearch()"><i class="fas fa-times"></i> Clear</button></div><div id="userResults" class="user-results"><div class="empty-state"><i class="fas fa-user-search"></i><p>Search for a user by ID, username, or Telegram ID</p></div></div></div>`;

  async getUserReferrals(userId,userName){
    try{
      const referralsRef=await this.db.ref(`referrals/${userId}`).once('value');
      const referrals=[];
      if(referralsRef.exists()) referralsRef.forEach(child=>{ referrals.push({id:child.key,...child.val()}); });
      referrals.sort((a,b)=>(b.joinedAt||0)-(a.joinedAt||0));
      const recentReferrals=referrals.slice(0,10);
      let message=`<b>👥 Referrals of ${userName}</b>\n\n`;
      if(recentReferrals.length===0) message+="No referrals found.";
      else{ message+=`📊 Total Referrals: ${referrals.length}\n📋 Last 10 Referrals:\n\n`; recentReferrals.forEach((ref,idx)=>{ const joinedDate=ref.joinedAt?this.formatDateTime(ref.joinedAt):'N/A'; message+=`${idx+1}. <b>${ref.firstName||'User'}</b>\n   🆔 ID: ${ref.userId||ref.id}\n   ${ref.username?`👤 Username: ${ref.username}\n`:''}   📅 Joined: ${joinedDate}\n   📌 Status: ${ref.state==='verified'?'✅ Verified':'⏳ Pending'}\n\n`;}); }
      await this.sendTelegramMessage(ADMIN_TELEGRAM_ID,message);
      this.showNotification("Success","Referrals list sent to admin","success");
    } catch(e){ this.showNotification("Error","Failed to get referrals","error"); }
  }

  showBalanceModal(userId,userName,type,action){

  async updateBalance(userId,type,action){
    const amount=type==='ton'?parseFloat(document.getElementById('balanceAmount').value):parseInt(document.getElementById('balanceAmount').value);
    const reason=document.getElementById('balanceReason').value.trim()||`Admin ${action==='add'?'added':'removed'} ${type.toUpperCase()}`;
    if(!amount||amount<=0){ this.showNotification("Error","Please enter valid amount","error"); return; }
    try{
      const userRef=this.db.ref(`users/${userId}`); const snapshot=await userRef.once('value');
      if(!snapshot.exists()){ this.showNotification("Error","User not found","error"); return; }
      const user=snapshot.val(); const field=type==='ton'?'balance':'pop'; const current=this.safeNumber(user[field]); const newValue=action==='add'?current+amount:Math.max(0,current-amount);
      const updates={[field]:newValue}; if(type==='ton' && action==='add') updates.totalEarned=this.safeNumber(user.totalEarned)+amount;
      await userRef.update(updates);
      this.showNotification("Success",`${action==='add'?'Added':'Removed'} ${amount} ${type.toUpperCase()} ${action==='add'?'to':'from'} user`,"success");
      document.querySelector('.modal-overlay.show')?.remove(); await this.searchUser();
    } catch(e){ this.showNotification("Error","Failed to update balance","error"); }
  }

  async banUser(userId,button){ if(!confirm('Ban this user?')) return; await this.db.ref(`users/${userId}/status`).set('ban'); this.showNotification("Success","User banned","success"); if(button){ button.innerHTML='<i class="fas fa-check"></i> UNBAN'; button.className='action-btn btn-success'; button.onclick=()=>this.unbanUser(userId,button); } }
  async unbanUser(userId,button){ if(!confirm('Unban this user?')) return; await this.db.ref(`users/${userId}/status`).set('free'); this.showNotification("Success","User unbanned","success"); if(button){ button.innerHTML='<i class="fas fa-ban"></i> BAN'; button.className='action-btn btn-danger'; button.onclick=()=>this.banUser(userId,button); } }

  async renderTasks(){
    this.elements.contentArea.innerHTML=`<div class="tasks-page"><div class="page-header"><h2><i class="fas fa-list-check"></i> Tasks Management</h2><p>Create and manage Main & Partner tasks</p></div><div class="search-section"><div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchTaskInput" placeholder="Search task by name"><button class="search-btn" onclick="admin.searchTask()"><i class="fas fa-search"></i> Search</button></div><button class="action-btn btn-secondary" onclick="admin.clearTaskSearch()"><i class="fas fa-times"></i> Clear</button></div><div class="tasks-management"><div class="create-task-section"><div class="card"><h3><i class="fas fa-plus-circle"></i> Create New Task</h3><div class="form-group"><label>Task Name *</label><input type="text" id="taskName" placeholder="Join our channel" maxlength="15"><small>Maximum 15 characters</small></div><div class="form-group"><label>Task Link (URL) *</label><input type="text" id="taskLink" placeholder="https://t.me/... or @username"></div><div class="form-group"><label>Task Image URL (Optional)</label><input type="text" id="taskImage" placeholder="https://example.com/image.jpg"></div><div class="form-group"><label>Task Category *</label><div class="type-selector"><button class="type-btn active" data-type="main"><i class="fas fa-star"></i> Main</button><button class="type-btn" data-type="partner"><i class="fas fa-handshake"></i> Partner</button></div></div><div class="form-group"><label>Task Reward (TON) *</label><input type="number" id="taskReward" step="0.001" min="0.001" value="0.02"><small>Reward amount in TON</small></div><div class="form-group"><label>Max Completions *</label><input type="number" id="taskMaxCompletions" value="100" min="1"></div><div class="form-group"><label>Verification Required</label><select id="taskVerification"><option value="NO">No verification</option><option value="YES">Yes (bot must be admin)</option></select></div><button class="action-btn btn-success" onclick="admin.createTask()"><i class="fas fa-plus-circle"></i> Create Task</button></div></div><div class="tasks-list-section"><div class="card"><div class="section-header"><h3><i class="fas fa-list"></i> Active Tasks</h3><button class="action-btn btn-secondary" onclick="admin.loadTasks()"><i class="fas fa-sync-alt"></i> Refresh</button></div><div id="tasksList" class="tasks-list"><div class="loading"><div class="spinner"></div><p>Loading tasks...</p></div></div></div></div></div></div>`;
    this.setupTaskTypeButtons(); await this.loadTasks();

  setupTaskTypeButtons(){ const btns=document.querySelectorAll('.type-btn'); btns.forEach(btn=>{ btn.addEventListener('click',()=>{ btns.forEach(b=>b.classList.remove('active')); btn.classList.add('active'); const reward=btn.dataset.type==='main'?0.02:0.01; const rewardInput=document.getElementById('taskReward'); if(rewardInput) rewardInput.value=reward; }); }); const mainBtn=document.querySelector('.type-btn[data-type="main"]'); if(mainBtn && document.getElementById('taskReward')) document.getElementById('taskReward').value=0.02; }
  async searchTask(){ const term=document.getElementById('searchTaskInput').value.trim().toLowerCase(); if(!term){ await this.loadTasks(); return; } try{ const snap=await this.db.ref('config/tasks').once('value'); const tasks=[]; if(snap.exists()) snap.forEach(child=>{ const t=child.val(); if(t.status!=='deleted' && t.name.toLowerCase().includes(term)) tasks.push({id:child.key,...t}); }); this.displayTasks(tasks); } catch(e){ this.showNotification("Error","Search failed","error"); } }
  clearTaskSearch(){ document.getElementById('searchTaskInput').value=''; this.loadTasks(); }
  async loadTasks(){ try{ const snap=await this.db.ref('config/tasks').once('value'); const tasks=[]; if(snap.exists()) snap.forEach(child=>{ const t=child.val(); if(t.status!=='deleted') tasks.push({id:child.key,...t}); }); this.displayTasks(tasks); } catch(e){ document.getElementById('tasksList').innerHTML=`<div class="error-message"><i class="fas fa-exclamation-triangle"></i><p>Failed to load tasks</p></div>`; } }
  displayTasks(tasks){
    const container=document.getElementById('tasksList'); if(tasks.length===0){ container.innerHTML=`<div class="empty-state"><i class="fas fa-list-check"></i><p>No active tasks</p></div>`; return; }
    tasks.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)); let html='';
    tasks.forEach(task=>{ const progress=task.maxCompletions>0?(task.currentCompletions||0)/task.maxCompletions*100:0; let typeClass='type-main',typeText='Main'; if(task.category==='partner'){ typeClass='type-partner'; typeText='Partner'; } const isCompleted=progress>=100; const imageUrl=task.picture||DEFAULT_IMAGE_URL; const verificationIcon=task.verification==='YES'?'🔒':'🔓';
      html+=`<div class="task-item ${isCompleted?'completed':''}"><div class="task-image-container"><img src="${imageUrl}" alt="${task.name}" class="task-image" onerror="this.src='${DEFAULT_IMAGE_URL}'"></div><div class="task-header"><h4>${task.name} ${verificationIcon}</h4><div class="task-meta"><span class="task-type ${typeClass}">${typeText}</span><span class="task-status ${isCompleted?'status-completed':'status-active'}">${isCompleted?'COMPLETED':'ACTIVE'}</span></div></div><div class="task-url"><i class="fas fa-link"></i><a href="${task.url}" target="_blank">${task.url.substring(0,40)}${task.url.length>40?'...':''}</a></div><div class="task-progress"><div class="progress-info"><span>Completions: ${task.currentCompletions||0}/${task.maxCompletions}</span><span>${progress.toFixed(1)}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div></div><div class="task-actions"><button class="action-btn btn-primary" onclick="admin.showEditTaskModal('${task.id}',${task.maxCompletions})"><i class="fas fa-edit"></i> Edit Total</button><button class="action-btn btn-danger" onclick="admin.deleteTask('${task.id}')"><i class="fas fa-trash"></i> Delete</button></div></div>`;
    }); container.innerHTML=html;
  }
  showEditTaskModal(taskId,currentMax){ const modal=document.createElement('div'); modal.className='modal-overlay'; modal.innerHTML=`<div class="modal-content"><div class="modal-header"><h3><i class="fas fa-edit"></i> Edit Task Max Completions</h3><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button></div><div class="modal-body"><div class="form-group"><label>New Max Completions</label><input type="number" id="editMaxCompletions" value="${currentMax}" min="1"></div></div><div class="modal-footer"><button class="action-btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button class="action-btn btn-primary" onclick="admin.updateTaskMaxCompletions('${taskId}')">Update</button></div></div>`; document.body.appendChild(modal); setTimeout(()=>modal.classList.add('show'),10); }
  async updateTaskMaxCompletions(taskId){ const newMax=parseInt(document.getElementById('editMaxCompletions').value); if(!newMax||newMax<1){ this.showNotification("Error","Invalid number","error"); return; } await this.db.ref(`config/tasks/${taskId}/maxCompletions`).set(newMax); this.showNotification("Success","Task updated","success"); document.querySelector('.modal-overlay.show')?.remove(); await this.loadTasks(); }
  async createTask(){
    const name=document.getElementById('taskName').value.trim(); const image=document.getElementById('taskImage').value.trim(); const link=document.getElementById('taskLink').value.trim(); const maxCompletions=parseInt(document.getElementById('taskMaxCompletions').value)||100; const typeBtn=document.querySelector('.type-btn.active'); const category=typeBtn?typeBtn.dataset.type:'main'; const verification=document.getElementById('taskVerification').value; const reward=parseFloat(document.getElementById('taskReward').value)||(category==='main'?0.02:0.01);
    if(!name||!link){ this.showNotification("Error","Fill required fields","error"); return; }
    if(name.length>15){ this.showNotification("Error","Name max 15 chars","error"); return; }
    let formattedLink=link.trim(); if(!formattedLink.startsWith('http')&&!formattedLink.startsWith('@')) formattedLink='https://t.me/'+formattedLink; else if(formattedLink.startsWith('@')) formattedLink='https://t.me/'+formattedLink.substring(1);
    const taskData={ name, url:formattedLink, category, reward, popReward:1, maxCompletions, currentCompletions:0, status:'active', verification, createdBy:'admin', createdAt:Date.now(), picture:image||DEFAULT_IMAGE_URL };
    await this.db.ref('config/tasks').push(taskData);
    document.getElementById('taskName').value=''; document.getElementById('taskImage').value=''; document.getElementById('taskLink').value='';
    this.showNotification("Success","Task created!","success"); await this.loadTasks();
  }
  async deleteTask(taskId){ if(!confirm('Delete task?')) return; await this.db.ref(`config/tasks/${taskId}`).update({status:'deleted',deletedAt:Date.now()}); this.showNotification("Success","Task deleted","success"); await this.loadTasks(); }

  async renderPromoCodes(){ this.elements.contentArea.innerHTML=`<div class="promo-page"><div class="page-header"><h2><i class="fas fa-ticket"></i> Promo Codes</h2><p>Create and manage promo codes</p></div><div class="promo-management"><div class="create-promo-section"><div class="card"><h3><i class="fas fa-plus-circle"></i> Create New Promo</h3><div class="form-group"><label>Promo Code *</label><div class="code-input-group"><input type="text" id="promoCode" placeholder="Enter code or click Random" style="text-transform:uppercase;"><button class="action-btn btn-secondary" onclick="admin.generateRandomCode()"><i class="fas fa-random"></i> Random</button></div></div><div class="form-group"><label>Reward Type</label><div class="reward-type-selector"><button class="reward-type-btn active" data-type="ton"><i class="fas fa-coins"></i> TON</button><button class="reward-type-btn" data-type="pop"><i class="fas fa-star"></i> POP</button></div></div><div class="form-group"><label>Reward Amount *</label><input type="number" id="promoReward" step="0.001" min="0.001" placeholder="Enter amount..."></div><div class="form-group"><label>Max Uses (0 = unlimited)</label><input type="number" id="promoMaxUses" value="0" min="0"></div><button class="action-btn btn-success" onclick="admin.createPromoCode()"><i class="fas fa-plus-circle"></i> Create Promo</button></div></div><div class="promo-list-section"><div class="card"><div class="section-header"><h3><i class="fas fa-list"></i> Active Promo Codes</h3><button class="action-btn btn-secondary" onclick="admin.loadPromoCodes()"><i class="fas fa-sync-alt"></i> Refresh</button></div><div id="promoCodesList" class="promo-codes-list"><div class="loading"><div class="spinner"></div><p>Loading promo codes...</p></div></div></div></div></div></div>`; this.setupRewardTypeButtons(); await this.loadPromoCodes(); }
  setupRewardTypeButtons(){ const btns=document.querySelectorAll('.reward-type-btn'); btns.forEach(btn=>{ btn.addEventListener('click',()=>{ btns.forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }); }); }
  generateRandomCode(){ let code=''; const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'; for(let i=0;i<8;i++) code+=chars.charAt(Math.floor(Math.random()*chars.length)); document.getElementById('promoCode').value=code; }
  async loadPromoCodes(){ try{ const snap=await this.db.ref('config/promoCodes').once('value'); const codes=[]; if(snap.exists()) snap.forEach(child=>{ codes.push({id:child.key,...child.val()}); }); this.displayPromoCodes(codes); } catch(e){ document.getElementById('promoCodesList').innerHTML=`<div class="error-message"><i class="fas fa-exclamation-triangle"></i><p>Failed to load</p></div>`; } }
  displayPromoCodes(codes){ const container=document.getElementById('promoCodesList'); if(codes.length===0){ container.innerHTML=`<div class="empty-state"><i class="fas fa-ticket"></i><p>No promo codes</p></div>`; return; } codes.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)); let html=''; codes.forEach(p=>{ const used=p.usedCount||0; const max=p.maxUses||0; const remaining=max>0?max-used:'∞'; const isFullyUsed=max>0&&used>=max; const totalDistributed=used*(p.reward||0); const rewardType=p.rewardType||'ton'; const symbol=rewardType==='ton'?'TON':'POP'; html+=`<div class="promo-code-item"><div class="promo-header"><div><h4><i class="fas fa-ticket"></i> ${p.code}</h4><div class="promo-meta"><span class="promo-status ${isFullyUsed?'status-expired':'status-active'}">${isFullyUsed?'USED UP':'ACTIVE'}</span><span class="promo-reward"><i class="fas fa-gem"></i> ${p.reward||0} ${symbol}</span></div></div><div class="promo-actions"><button class="action-btn btn-primary" onclick="admin.copyPromoCode('${p.code}')"><i class="fas fa-copy"></i> Copy</button><button class="action-btn btn-danger" onclick="admin.deletePromoCodePermanently('${p.id}')"><i class="fas fa-trash"></i> Delete</button></div></div><div class="promo-details"><div class="detail"><span>Used:</span><span>${used} / ${max>0?max:'∞'}</span></div><div class="detail"><span>Remaining:</span><span>${remaining}</span></div><div class="detail"><span>Total Distributed:</span><span>${totalDistributed.toFixed(3)} ${symbol}</span></div></div>${max>0?`<div class="promo-progress"><div class="progress-bar"><div class="progress-fill" style="width:${Math.min((used/max)*100,100)}%"></div></div></div>`:''}</div>`; }); container.innerHTML=html; }
  async createPromoCode(){ const code=document.getElementById('promoCode').value.trim().toUpperCase(); const rewardTypeBtn=document.querySelector('.reward-type-btn.active'); const rewardType=rewardTypeBtn?rewardTypeBtn.dataset.type:'ton'; const reward=parseFloat(document.getElementById('promoReward').value); const maxUses=parseInt(document.getElementById('promoMaxUses').value)||0; if(!code||!reward||reward<=0){ this.showNotification("Error","Invalid code or reward","error"); return; } const existing=await this.db.ref('config/promoCodes').orderByChild('code').equalTo(code).once('value'); if(existing.exists()){ this.showNotification("Error","Code exists","error"); return; } await this.db.ref('config/promoCodes').push({code,rewardType,reward,maxUses,usedCount:0,status:'active',createdBy:'admin',createdAt:Date.now()}); document.getElementById('promoCode').value=''; document.getElementById('promoReward').value=''; document.getElementById('promoMaxUses').value='0'; this.showNotification("Success","Promo created!","success"); await this.loadPromoCodes(); }
  copyPromoCode(code){ navigator.clipboard.writeText(code).then(()=>this.showNotification("Copied",`${code} copied`,"success")).catch(()=>this.showNotification("Error","Copy failed","error")); }
  async deletePromoCodePermanently(id){ if(!confirm('Delete permanently?')) return; await this.db.ref(`config/promoCodes/${id}`).remove(); this.showNotification("Success","Deleted","success"); await this.loadPromoCodes(); }

  async renderWithdrawals(){ this.elements.contentArea.innerHTML=`<div class="withdrawals-page"><div class="page-header"><h2><i class="fas fa-money-bill-wave"></i> Withdrawals Management</h2><p>Process and manage withdrawal requests</p></div><div class="search-section"><div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchWithdrawalUser" placeholder="Search by Telegram ID"><button class="search-btn" onclick="admin.searchUserWithdrawals()"><i class="fas fa-search"></i> Search User</button></div><button class="action-btn btn-secondary" onclick="admin.clearWithdrawalSearch()"><i class="fas fa-times"></i> Clear</button></div><div class="withdrawals-stats"><div class="mini-stat-card"><i class="fas fa-clock"></i><div><h4>Pending</h4><p id="pendingCount">0</p></div></div><div class="mini-stat-card"><i class="fas fa-check-circle"></i><div><h4>Completed</h4><p id="completedCount">0</p></div></div><div class="mini-stat-card"><i class="fas fa-times-circle"></i><div><h4>Rejected</h4><p id="rejectedCount">0</p></div></div><div class="mini-stat-card"><i class="fas fa-calendar-day"></i><div><h4>Today</h4><p id="todayCount">0</p></div></div></div><div class="withdrawals-management"><div class="card"><div class="section-header"><h3><i class="fas fa-clock"></i> Pending Withdrawals</h3><button class="action-btn btn-secondary" onclick="admin.loadWithdrawals()"><i class="fas fa-sync-alt"></i> Refresh</button></div><div id="withdrawalsList" class="withdrawals-list"><div class="loading"><div class="spinner"></div><p>Loading withdrawals...</p></div></div></div></div><div id="userWithdrawalsResults" class="user-withdrawals-section" style="display:none;"></div></div>`; await this.loadWithdrawals(); }
  async searchUserWithdrawals(){ const userId=document.getElementById('searchWithdrawalUser').value.trim(); if(!userId){ this.showNotification("Info","Enter User ID","info"); return; } try{ const userSnap=await this.db.ref('users').orderByChild('telegramId').equalTo(userId).once('value'); let actualUserId=null; if(!userSnap.exists()){ this.showNotification("Error","User not found","error"); return; } userSnap.forEach(child=>{ actualUserId=child.key; }); if(!actualUserId){ this.showNotification("Error","User not found","error"); return; } const [pendingSnap,completedSnap,rejectedSnap]=await Promise.all([this.db.ref('withdrawals/pending').orderByChild('userId').equalTo(actualUserId).once('value'),this.db.ref('withdrawals/completed').orderByChild('userId').equalTo(actualUserId).once('value'),this.db.ref('withdrawals/rejected').orderByChild('userId').equalTo(actualUserId).once('value')]); const userDataSnap=await this.db.ref(`users/${actualUserId}`).once('value'); const userData=userDataSnap.val(); const userName=userData.firstName||userData.username||actualUserId; const cleanUsername=(userData.username||'').startsWith('@')?userData.username.substring(1):userData.username||userName; let all=[]; if(pendingSnap.exists()) pendingSnap.forEach(c=>all.push({...c.val(),id:c.key,status:'pending'})); if(completedSnap.exists()) completedSnap.forEach(c=>all.push({...c.val(),id:c.key,status:'completed'})); if(rejectedSnap.exists()) rejectedSnap.forEach(c=>all.push({...c.val(),id:c.key,status:'rejected'})); if(all.length===0) document.getElementById('userWithdrawalsResults').innerHTML=`<div class="card"><h3>Withdrawals for ${cleanUsername}</h3><div class="empty-state"><i class="fas fa-wallet"></i><p>No withdrawals found</p></div></div>`; else this.displayUserWithdrawals(all,cleanUsername,actualUserId); document.getElementById('userWithdrawalsResults').style.display='block'; } catch(e){ this.showNotification("Error","Search failed","error"); } }
  displayUserWithdrawals(withdrawals,userName,userId){ withdrawals.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)); let html=`<div class="card"><div class="section-header"><h3>Withdrawals for ${userName}</h3><button class="action-btn btn-secondary" onclick="document.getElementById('userWithdrawalsResults').style.display='none'"><i class="fas fa-times"></i> Close</button></div><div class="user-withdrawals-list">`; withdrawals.forEach(w=>{ const date=w.createdAt?this.formatDateTime(w.createdAt):'N/A'; const walletAddress=w.walletAddress||''; const walletDisplay=walletAddress.length>10?`${walletAddress.substring(0,5)}...${walletAddress.substring(walletAddress.length-5)}`:walletAddress; let statusClass='',statusText=''; if(w.status==='pending'){ statusClass='status-active'; statusText='PENDING'; } else if(w.status==='completed'){ statusClass='status-completed'; statusText='COMPLETED'; } else{ statusClass='status-expired'; statusText='REJECTED'; } html+=`<div class="withdrawal-item ${w.status}"><div class="withdrawal-status ${statusClass}">${statusText}</div><div class="withdrawal-details"><div class="detail"><span><i class="fas fa-calendar"></i> Date:</span><span>${date}</span></div><div class="detail"><span><i class="fas fa-wallet"></i> Wallet:</span><span class="copyable-wallet" onclick="admin.copyToClipboard('${walletAddress}')">${walletDisplay}</span></div><div class="detail"><span><i class="fas fa-coins"></i> Amount:</span><span>${w.amount?w.amount.toFixed(5):'0.00000'} TON</span></div></div>${w.status==='pending'?`<div class="withdrawal-actions"><button class="action-btn btn-success" onclick="admin.showApproveModal('${w.id}',${w.amount},'${w.walletAddress}','${w.userId}','${userName}')"><i class="fas fa-check"></i> Approve</button><button class="action-btn btn-danger" onclick="admin.rejectWithdrawal('${w.id}')"><i class="fas fa-times"></i> Reject</button></div>`:''}</div>`; }); html+=`</div></div>`; document.getElementById('userWithdrawalsResults').innerHTML=html; }
  clearWithdrawalSearch(){ document.getElementById('searchWithdrawalUser').value=''; document.getElementById('userWithdrawalsResults').style.display='none'; }
  async loadWithdrawals(){ try{ const[pendingSnap,completedSnap,rejectedSnap]=await Promise.all([this.db.ref('withdrawals/pending').once('value'),this.db.ref('withdrawals/completed').once('value'),this.db.ref('withdrawals/rejected').once('value')]); const today=new Date().setHours(0,0,0,0); let pendingCount=0,completedCount=0,rejectedCount=0,todayCount=0; if(pendingSnap.exists()) pendingCount=pendingSnap.numChildren(); if(completedSnap.exists()){ completedCount=completedSnap.numChildren(); completedSnap.forEach(c=>{ if(c.val().createdAt&&c.val().createdAt>=today) todayCount++; }); } if(rejectedSnap.exists()) rejectedCount=rejectedSnap.numChildren(); document.getElementById('pendingCount').textContent=pendingCount; document.getElementById('completedCount').textContent=completedCount; document.getElementById('rejectedCount').textContent=rejectedCount; document.getElementById('todayCount').textContent=todayCount; await this.displayPendingWithdrawals(pendingSnap); } catch(e){ document.getElementById('withdrawalsList').innerHTML=`<div class="error-message"><i class="fas fa-exclamation-triangle"></i><p>Failed to load</p></div>`; } }
  async displayPendingWithdrawals(pendingSnap){ const container=document.getElementById('withdrawalsList'); if(!pendingSnap.exists()||pendingSnap.numChildren()===0){ container.innerHTML=`<div class="empty-state"><i class="fas fa-wallet"></i><p>No pending withdrawals</p></div>`; return; } let html=''; const promises=[]; pendingSnap.forEach(child=>{ const request=child.val(); const requestId=child.key; promises.push(this.db.ref(`users/${request.userId}`).once('value').then(userSnap=>({request,requestId,userData:userSnap.val()}))); }); const results=await Promise.all(promises); results.forEach(({request,requestId,userData})=>{ const formattedDate=this.formatDateTime(request.createdAt); const walletAddress=request.walletAddress||''; const walletDisplay=walletAddress.length>10?`${walletAddress.substring(0,5)}...${walletAddress.substring(walletAddress.length-5)}`:walletAddress; const username=userData?.username||''; const cleanUsername=username.startsWith('@')?username.substring(1):username; const photoUrl=userData?.photoUrl||DEFAULT_IMAGE_URL; html+=`<div class="withdrawal-item"><div class="withdrawal-header"><div class="user-info"><div class="user-avatar"><img src="${photoUrl}" alt="${request.userName||'User'}" onerror="this.src='${DEFAULT_IMAGE_URL}'"></div><div><h4>${cleanUsername||request.userName||'Unknown'}</h4><p class="user-details">ID: ${request.userId}</p></div></div></div><div class="withdrawal-details"><div class="detail"><span><i class="fas fa-calendar"></i> Date:</span><span>${formattedDate}</span></div><div class="detail"><span><i class="fas fa-wallet"></i> Wallet:</span><span class="copyable-wallet" onclick="admin.copyToClipboard('${walletAddress}')">${walletDisplay}</span></div><div class="detail"><span><i class="fas fa-coins"></i> Amount:</span><span>${request.amount?request.amount.toFixed(5):'0.00000'} TON</span></div></div><div class="withdrawal-actions"><button class="action-btn btn-success" onclick="admin.showApproveModal('${requestId}',${request.amount},'${request.walletAddress}','${request.userId}','${cleanUsername||request.userName||''}')"><i class="fas fa-check"></i> Approve</button><button class="action-btn btn-danger" onclick="admin.rejectWithdrawal('${requestId}')"><i class="fas fa-times"></i> Reject</button></div></div>`; }); container.innerHTML=html; }
  formatDateTime(ts){ if(!ts) return 'N/A'; const d=new Date(ts); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
  showApproveModal(requestId,amount,wallet,userId,userName){ const modal=document.createElement('div'); modal.className='modal-overlay'; modal.innerHTML=`<div class="modal-content"><div class="modal-header"><h3><i class="fas fa-check-circle"></i> Approve Withdrawal</h3><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button></div><div class="modal-body"><p>Approve withdrawal for:</p><div class="user-info-modal"><strong>${userName}</strong></div><div class="withdrawal-summary"><div class="summary-item"><span>Amount:</span><div class="summary-value-group"><span class="amount-value">${amount.toFixed(5)} TON</span><button class="btn-copy" onclick="admin.copyToClipboard('${amount.toFixed(5)} TON')"><i class="fas fa-copy"></i></button></div></div><div class="summary-item"><span>Wallet:</span><div class="summary-value-group"><span class="wallet-value">${wallet}</span><button class="btn-copy" onclick="admin.copyToClipboard('${wallet}')"><i class="fas fa-copy"></i></button></div></div></div><div class="form-group"><label>Transaction Hash *</label><div class="transaction-input-group"><span class="transaction-prefix">https://tonviewer.com/transaction/</span><input type="text" id="transactionHash" placeholder="Enter transaction hash"></div></div></div><div class="modal-footer"><button class="action-btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button class="action-btn btn-success" onclick="admin.approveWithdrawal('${requestId}','${userId}',${amount},'${wallet}')">Approve</button></div></div>`; document.body.appendChild(modal); setTimeout(()=>modal.classList.add('show'),10); }
  copyToClipboard(text){ navigator.clipboard.writeText(text).then(()=>this.showNotification("Copied","Copied!","success")).catch(()=>this.showNotification("Error","Copy failed","error")); }
  async approveWithdrawal(requestId,userId,amount,wallet){ const txHash=document.getElementById('transactionHash')?.value.trim(); if(!txHash){ this.showNotification("Error","Enter transaction hash","error"); return; } const txLink=`https://tonviewer.com/transaction/${txHash}`; try{ const requestRef=this.db.ref(`withdrawals/pending/${requestId}`); const snapshot=await requestRef.once('value'); const request=snapshot.val(); if(!request){ this.showNotification("Error","Request not found","error"); return; } const userSnap=await this.db.ref(`users/${userId}`).once('value'); const userData=userSnap.val(); await this.db.ref(`withdrawals/completed/${requestId}`).set({...request,status:'completed',processedAt:Date.now(),transaction_link:txLink}); await requestRef.remove(); await this.sendWithdrawalNotification(userId,amount,wallet,txLink,userData); this.showNotification("Success","Withdrawal approved!","success"); document.querySelector('.modal-overlay.show')?.remove(); await this.loadWithdrawals(); } catch(e){ this.showNotification("Error","Approval failed","error"); } }
  async rejectWithdrawal(requestId){ if(!confirm('Reject withdrawal?')) return; try{ const requestRef=this.db.ref(`withdrawals/pending/${requestId}`); const snapshot=await requestRef.once('value'); const request=snapshot.val(); if(!request){ this.showNotification("Error","Request not found","error"); return; } await this.db.ref(`withdrawals/rejected/${requestId}`).set({...request,status:'rejected',processedAt:Date.now()}); await requestRef.remove(); this.showNotification("Success","Withdrawal rejected","success"); await this.loadWithdrawals(); } catch(e){ this.showNotification("Error","Rejection failed","error"); } }
  async sendWithdrawalNotification(userId,amount,wallet,transactionLink,userData){ try{ let msg=this.settings.withdrawalMessage||"✅ Your withdrawal has been approved!\n\n💎 Amount: {amount} TON\n💰 Wallet: {wallet}\n🔗 Transaction: {transaction}\n\nThank you!"; msg=msg.replace('{amount}',amount.toFixed(5)).replace('{wallet}',wallet).replace('{transaction}',transactionLink); const btns=[]; if(transactionLink) btns.push([{text:"🔗 View on Explorer",url:transactionLink}]); if(this.settings.withdrawalButtons) this.settings.withdrawalButtons.forEach(btn=>{ if(btn.text&&btn.url) btns.push([{text:btn.text,url:btn.url}]); }); await this.sendTelegramMessage(userId,msg,btns); } catch(e){} }

  async renderBroadcast(){ this.elements.contentArea.innerHTML=`<div class="broadcast-page"><div class="page-header"><h2><i class="fas fa-bullhorn"></i> Broadcast Messages</h2><p>Send messages to all users or specific users</p></div><div class="broadcast-management"><div class="card"><h3><i class="fas fa-edit"></i> Create Broadcast</h3><div class="form-group"><label>Recipients</label><select id="broadcastType" onchange="admin.toggleBroadcastTarget()"><option value="all">All Users</option><option value="specific">Specific User</option></select></div><div id="specificUserField" class="form-group" style="display:none;"><label>User ID</label><input type="text" id="broadcastUserId" placeholder="Telegram User ID"></div><div class="form-group"><label>Image (Optional, JPG/PNG URL)</label><input type="text" id="broadcastImage" placeholder="https://example.com/image.jpg"></div><div class="form-group"><label>Message *</label><textarea id="broadcastMessage" rows="5" placeholder="Enter your message here..."></textarea></div><div class="html-tools"><button class="html-btn" onclick="admin.insertHtmlTag('b')"><b>B</b></button><button class="html-btn" onclick="admin.insertHtmlTag('i')"><i>I</i></button><button class="html-btn" onclick="admin.insertHtmlTag('u')"><u>U</u></button><button class="html-btn" onclick="admin.insertLink()">🔗 Link</button><button class="html-btn" onclick="admin.insertEmoji()">😊 Emoji</button></div><div class="inline-buttons-section"><h4><i class="fas fa-th-large"></i> Inline Buttons</h4><div id="inlineButtonsContainer"><div class="button-row"><input type="text" class="button-text" placeholder="Button text" maxlength="30"><input type="text" class="button-url" placeholder="URL"><button class="btn-sm btn-danger" onclick="this.parentElement.remove(); admin.updatePreview()"><i class="fas fa-times"></i></button></div></div><button class="action-btn btn-secondary" onclick="admin.addInlineButton()"><i class="fas fa-plus"></i> Add Button</button></div><div class="broadcast-preview"><h4>Preview</h4><div id="broadcastPreview" class="preview-content"><div class="preview-placeholder"><i class="fas fa-comment-alt"></i><p>Preview will appear here</p></div></div></div><div class="broadcast-actions"><button class="action-btn btn-secondary" onclick="admin.updatePreview()"><i class="fas fa-eye"></i> Update Preview</button><button class="action-btn btn-success" onclick="admin.startBackgroundBroadcast()"><i class="fas fa-paper-plane"></i> Send Broadcast</button></div></div></div></div>`; this.updatePreview(); }
  toggleBroadcastTarget(){ const type=document.getElementById('broadcastType').value; document.getElementById('specificUserField').style.display=type==='specific'?'block':'none'; }
  addInlineButton(){ const container=document.getElementById('inlineButtonsContainer'); if(container.querySelectorAll('.button-row').length>=5){ this.showNotification("Warning","Max 5 rows","warning"); return; } const row=document.createElement('div'); row.className='button-row'; row.innerHTML=`<input type="text" class="button-text" placeholder="Button text" maxlength="30"><input type="text" class="button-url" placeholder="URL"><button class="btn-sm btn-danger" onclick="this.parentElement.remove(); admin.updatePreview()"><i class="fas fa-times"></i></button>`; row.querySelectorAll('input').forEach(i=>i.addEventListener('input',()=>this.updatePreview())); container.appendChild(row); this.updatePreview(); }
  insertHtmlTag(tag){ const ta=document.getElementById('broadcastMessage'); const start=ta.selectionStart,end=ta.selectionEnd,selected=ta.value.substring(start,end); let startTag='',endTag=''; if(tag==='b'){startTag='<b>';endTag='</b>';} else if(tag==='i'){startTag='<i>';endTag='</i>';} else if(tag==='u'){startTag='<u>';endTag='</u>';} ta.value=ta.value.substring(0,start)+startTag+selected+endTag+ta.value.substring(end); ta.focus(); ta.setSelectionRange(start+startTag.length,start+startTag.length+selected.length); this.updatePreview(); }
  insertLink(){ const url=prompt('Enter URL:','https://'); if(!url) return; const text=prompt('Enter link text:',url); if(!text) return; const ta=document.getElementById('broadcastMessage'); const start=ta.selectionStart; ta.value=ta.value.substring(0,start)+`<a href="${url}">${text}</a>`+ta.value.substring(start); ta.focus(); this.updatePreview(); }
  insertEmoji(){ const emojis=['😊','🎉','🔥','💰','💎','⭐','✅','❌','⚠️','🔔','📢','🎁']; const emoji=prompt('Select emoji:\n'+emojis.join(' '),'🎉'); if(!emoji) return; const ta=document.getElementById('broadcastMessage'); const start=ta.selectionStart; ta.value=ta.value.substring(0,start)+emoji+ta.value.substring(start); ta.focus(); this.updatePreview(); }
  updatePreview(){ const msg=document.getElementById('broadcastMessage').value; const preview=document.getElementById('broadcastPreview'); let html=''; if(msg.trim()){ html=`<div class="message-content">${msg.replace(/\n/g,'<br>')}</div>`; const btns=this.getInlineButtons(); if(btns.length>0){ html+='<div class="buttons-preview">'; btns.forEach(row=>{ html+='<div class="buttons-row">'; row.forEach(btn=>{ if(btn.text&&btn.url) html+=`<a href="${btn.url}" class="preview-button" target="_blank">${btn.text}</a>`; }); html+='</div>'; }); html+='</div>'; } } else{ html=`<div class="preview-placeholder"><i class="fas fa-comment-alt"></i><p>Preview will appear here</p></div>`; } preview.innerHTML=html; }
  getInlineButtons(){ const rows=document.querySelectorAll('#inlineButtonsContainer .button-row'); const btns=[]; rows.forEach(row=>{ const text=row.querySelector('.button-text')?.value.trim(); const url=row.querySelector('.button-url')?.value.trim(); if(text&&url) btns.push([{text,url}]); }); return btns; }
  async startBackgroundBroadcast(){ const message=document.getElementById('broadcastMessage').value.trim(); const type=document.getElementById('broadcastType').value; const userId=document.getElementById('broadcastUserId')?.value.trim(); const imageUrl=document.getElementById('broadcastImage')?.value.trim(); const inlineButtons=this.getInlineButtons(); if(!message){ this.showNotification("Error","Enter message","error"); return; } if(type==='specific'&&!userId){ this.showNotification("Error","Enter User ID","error"); return; } this.showNotification("Info","Broadcast started in background","info"); this.processBroadcastInBackground(message,type,userId,imageUrl,inlineButtons); }
  async processBroadcastInBackground(message,type,userId,imageUrl,buttons){ try{ let users=[]; if(type==='all'){ const snap=await this.db.ref('users').once('value'); snap.forEach(child=>{ users.push({id:child.key,username:child.val().username}); }); } else{ const snap=await this.db.ref(`users/${userId}`).once('value'); if(!snap.exists()){ this.showNotification("Error","User not found","error"); return; } users.push({id:userId,username:snap.val().username}); } let sent=0,failed=0; for(const user of users){ try{ await this.sendTelegramMessageWithImage(user.id,message,imageUrl,buttons); sent++; } catch(e){ failed++; } await new Promise(r=>setTimeout(r,100)); } this.showNotification("Broadcast Complete",`Sent: ${sent}, Failed: ${failed}`,failed===0?"success":"warning"); } catch(e){ this.showNotification("Error","Broadcast failed","error"); } }
  async sendTelegramMessageWithImage(chatId,message,imageUrl,buttons=[]){ const payload={chat_id:chatId,text:message,parse_mode:'HTML',disable_web_page_preview:false}; if(buttons.length>0){ const keyboard=[]; buttons.forEach(row=>{ keyboard.push(row.map(btn=>({text:btn.text,url:btn.url}))); }); payload.reply_markup={inline_keyboard:keyboard}; } if(imageUrl && (imageUrl.match(/\.(jpg|jpeg|png)$/i))){ const photoPayload={chat_id:chatId,photo:imageUrl,caption:message,parse_mode:'HTML'}; if(buttons.length>0) photoPayload.reply_markup=payload.reply_markup; await fetch(`https://api.telegram.org/bot${this.botToken}/sendPhoto`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(photoPayload)}); } else{ await fetch(`https://api.telegram.org/bot${this.botToken}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); } return true; }

  async renderSettings(){ this.elements.contentArea.innerHTML=`<div class="settings-page"><div class="page-header"><h2><i class="fas fa-sliders-h"></i> Settings</h2><p>Configure admin panel settings</p></div><div class="settings-section"><div class="settings-card"><h3><i class="fas fa-envelope"></i> Withdrawal Notification Settings</h3><div class="form-group"><label>Withdrawal Approval Message</label><textarea id="withdrawalMessage" rows="6">${this.settings.withdrawalMessage||''}</textarea><small>Placeholders: {amount}, {wallet}, {transaction}</small></div><div class="form-group"><label>Message Image URL (Optional)</label><input type="text" id="withdrawalImage" value="${this.settings.withdrawalImage||''}"></div><div class="inline-buttons-section"><h4><i class="fas fa-th-large"></i> Message Buttons</h4><div id="withdrawalButtonsContainer">${(this.settings.withdrawalButtons||[]).map(btn=>`<div class="button-row"><input type="text" class="button-text" value="${btn.text}" placeholder="Button text" maxlength="30"><input type="text" class="button-url" value="${btn.url}" placeholder="URL"><button class="btn-sm btn-danger" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button></div>`).join('')||`<div class="button-row"><input type="text" class="button-text" placeholder="Button text" maxlength="30"><input type="text" class="button-url" placeholder="URL"><button class="btn-sm btn-danger" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button></div>`}</div><button class="action-btn btn-secondary" onclick="admin.addWithdrawalButton()"><i class="fas fa-plus"></i> Add Button</button></div><div class="settings-actions"><button class="action-btn btn-success" onclick="admin.saveSettings()"><i class="fas fa-save"></i> Save Settings</button></div></div></div></div>`; }
  addWithdrawalButton(){ const c=document.getElementById('withdrawalButtonsContainer'); if(c.querySelectorAll('.button-row').length>=5){ this.showNotification("Warning","Max 5 buttons","warning"); return; } const row=document.createElement('div'); row.className='button-row'; row.innerHTML=`<input type="text" class="button-text" placeholder="Button text" maxlength="30"><input type="text" class="button-url" placeholder="URL"><button class="btn-sm btn-danger" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>`; c.appendChild(row); }
  saveSettings(){ this.settings.withdrawalMessage=document.getElementById('withdrawalMessage')?.value||''; this.settings.withdrawalImage=document.getElementById('withdrawalImage')?.value||''; const btns=[]; document.querySelectorAll('#withdrawalButtonsContainer .button-row').forEach(row=>{ const text=row.querySelector('.button-text')?.value.trim(); const url=row.querySelector('.button-url')?.value.trim(); if(text&&url) btns.push({text,url}); }); this.settings.withdrawalButtons=btns; this.saveSettings(); this.showNotification("Success","Settings saved","success"); }
  async renderMyUid(){ this.elements.contentArea.innerHTML=`<div class="uid-page"><div class="page-header"><h2><i class="fas fa-id-card"></i> My UID</h2><p>Your Firebase Authentication UID</p></div><div class="uid-content"><div class="card uid-card"><div class="uid-info"><h3><i class="fas fa-key"></i> Your Firebase UID</h3><div class="uid-display"><div class="uid-value">${this.currentUser?this.currentUser.uid:'Not available'}</div><button class="action-btn btn-primary" onclick="admin.copyUid()"><i class="fas fa-copy"></i> Copy</button></div><p class="uid-description">Your unique Firebase Authentication ID</p></div><div class="uid-details"><div class="detail-row"><span class="detail-label"><i class="fas fa-info-circle"></i> Status:</span><span class="detail-value success">Authenticated</span></div><div class="detail-row"><span class="detail-label"><i class="fas fa-clock"></i> Login Time:</span><span class="detail-value">${this.formatDateTime(Date.now())}</span></div><div class="detail-row"><span class="detail-label"><i class="fas fa-user-shield"></i> Role:</span><span class="detail-value">Administrator</span></div></div><div class="uid-actions"><button class="action-btn btn-secondary" onclick="admin.refreshUidInfo()"><i class="fas fa-sync-alt"></i> Refresh Info</button></div></div></div></div>`; }
  copyUid(){ const uid=this.currentUser?this.currentUser.uid:''; if(!uid){ this.showNotification("Error","No UID","error"); return; } navigator.clipboard.writeText(uid).then(()=>this.showNotification("Copied","UID copied","success")).catch(()=>this.showNotification("Error","Copy failed","error")); }
  refreshUidInfo(){ this.showNotification("Refreshed","UID info updated","success"); this.renderMyUid(); }
  async sendTelegramMessage(chatId,message,inlineButtons=[]){ const url=`https://api.telegram.org/bot${this.botToken}/sendMessage`; const payload={chat_id:chatId,text:message,parse_mode:'HTML',disable_web_page_preview:false}; if(inlineButtons.length>0){ const keyboard=[]; inlineButtons.forEach(row=>{ keyboard.push(row.map(btn=>({text:btn.text,url:btn.url}))); }); payload.reply_markup={inline_keyboard:keyboard}; } const resp=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); const data=await resp.json(); if(!data.ok) throw new Error(data.description); if(this.settings.withdrawalImage){ try{ await fetch(`https://api.telegram.org/bot${this.botToken}/sendPhoto`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:chatId,photo:this.settings.withdrawalImage,caption:message,parse_mode:'HTML',reply_markup:payload.reply_markup})}); } catch(e){} } return true; }
  showNotification(title,message,type='info'){ const container=document.getElementById('notification-container'); const notif=document.createElement('div'); notif.className=`notification ${type}`; const icon=type==='success'?'✅':type==='error'?'❌':type==='warning'?'⚠️':'ℹ️'; notif.innerHTML=`<div class="notification-icon">${icon}</div><div class="notification-content"><div class="notification-title">${title}</div><div class="notification-message">${message}</div></div><button class="notification-close" onclick="this.parentElement.remove()">&times;</button>`; container.appendChild(notif); setTimeout(()=>{ if(notif.parentNode){ notif.style.opacity='0'; notif.style.transform='translateX(100%)'; setTimeout(()=>notif.remove(),300); } },5000); }
  safeNumber(value){ const num=Number(value); return isNaN(num)?0:num; }
}

const admin = new AdminPanel();
window.admin = admin;
    </script>
